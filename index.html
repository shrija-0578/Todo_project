<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My To-Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
    <h1> My To-Do List</h1>
    <p class="subtitle">Stay organized, one task at a time</p>

    <!-- Input row -->
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button id="addBtn">Add</button>
    </div>

    <!-- Filter buttons -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <!-- Task list gets filled in by JavaScript -->
    <ul class="task-list" id="taskList"></ul>

    <p class="empty-message" id="emptyMessage">No tasks here. Add one above!</p>

    <p class="footer"><span id="remainingCount">0</span> task(s) remaining</p>
  </div>

  <script src="script.js"></script>
  
</body>
</html>
